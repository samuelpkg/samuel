name: Agnostic check

# RFD 0002: Samuel v2 is agent-agnostic with a deliberate, scoped
# carve-out for Claude. The carve-out exists because Claude Code is the
# only major coding assistant that does not read AGENTS.md natively, so
# the trivial AGENTS.md → CLAUDE.md mirror is shipped as a built-in
# translator under internal/translator/claude/. Every richer translator
# (Cursor rules, future tools, anything non-trivial) still belongs in a
# plugin.
#
# Concretely: CLAUDE.md may appear in framework code; .claude/, .cursor/,
# .codex/, "Cursor", and "Codex CLI" may not. Any line marked
# "agnostic-allow" is an explicit migration helper opt-out.

on:
  push:
    branches: [main]
    paths:
      - 'internal/**'
      - 'cmd/**'
      - 'template/**'
      - '.github/workflows/agnostic-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'internal/**'
      - 'cmd/**'
      - 'template/**'
      - '.github/workflows/agnostic-check.yml'

jobs:
  grep-leaks:
    name: Tool-specific references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Forbid tool-specific references in internal/
        run: |
          set +e
          # Patterns matched as whole words / paths. The template and
          # this workflow file are the only places allowed to mention
          # AGENTS.md (which is itself agent-agnostic).
          #
          # Exceptions:
          #   - *_test.go — tests assert the framework does NOT couple to
          #     tool-specific outputs; mentioning those names there is
          #     anti-coupling, not coupling.
          #   - any line tagged "agnostic-allow" — explicit opt-out for
          #     PRD-mandated migration helpers (e.g. v1 leftover hint).
          # CLAUDE.md is now an allowed string (Claude carve-out — see
          # internal/translator/claude/). The other patterns remain
          # forbidden because they represent tool-specific surfaces that
          # still belong in plugins.
          PATTERNS='\.claude/|\.cursor/|\.codex/|Cursor|Codex CLI'
          HITS=$(grep -RInE "$PATTERNS" internal/ cmd/ 2>/dev/null \
            | grep -v -E '_test\.go:' \
            | grep -v 'agnostic-allow' \
            || true)
          if [ -n "$HITS" ]; then
            echo "::error::Tool-specific references found in internal/ or cmd/. Move to a translator plugin."
            echo "$HITS"
            exit 1
          fi
          echo "OK — no tool-specific leaks found."
