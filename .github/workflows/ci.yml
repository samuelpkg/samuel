name: CI

# Node 24 default for every JS action in this workflow. Becomes a no-op
# on 2026-06-02 when GitHub flips the runner default; safe to leave or
# remove then.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'template/**'
      - 'e2e/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'template/**'
      - 'e2e/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Build
        run: go build -v ./...
      - name: Test
        run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out
          fail_ci_if_error: false
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      # Bumped to v8 + golangci-lint v2 alongside the Go 1.25 toolchain
      # required by sigstore-go v1.1.4. The v1.x line of golangci-lint
      # was built with Go 1.24 and refuses to lint Go 1.25-targeted
      # code; v2 is built with Go 1.25. No .golangci.yml in the repo
      # means there's nothing to migrate config-wise.
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m

  e2e-hermetic:
    name: E2E (hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: Download dependencies
        run: go mod download
      # The hermetic suite builds its own `samuel` binary in TestMain
      # and runs it via exec.Command against tempdir fixtures. No
      # network, no live registry — see e2e/README.md.
      - name: E2E hermetic suite
        run: go test -tags=e2e -count=1 ./e2e/hermetic/...

  build:
    name: Build (Multi-platform)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -v -o /dev/null ./cmd/samuel
