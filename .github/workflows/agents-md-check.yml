name: AGENTS.md line budget

# RFD 0001 / PRD 0001 mandate a 150-line ceiling on template/AGENTS.md.tmpl.
# This check enforces it on every PR. The test in template/template_test.go
# is the dev-side mirror; this is the gate.

on:
  push:
    branches: [main]
    paths:
      - 'template/**'
      - '.github/workflows/agents-md-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'template/**'
      - '.github/workflows/agents-md-check.yml'

jobs:
  line-budget:
    name: Line budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check template/AGENTS.md.tmpl size
        run: |
          LINES=$(wc -l < template/AGENTS.md.tmpl)
          echo "AGENTS.md.tmpl line count: $LINES / 150 budget"
          if [ "$LINES" -gt 150 ]; then
            echo "::error::template/AGENTS.md.tmpl is $LINES lines; budget is 150."
            exit 1
          fi
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true
      - name: Run rendered-template line-budget test
        run: go test -run TestAgentsMDTemplate -v ./template/...
